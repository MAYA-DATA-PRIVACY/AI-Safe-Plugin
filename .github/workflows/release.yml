name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  verify-release-version:
    name: Verify Release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      release_version: ${{ steps.release_meta.outputs.release_version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.7'
          python-version: '3.11'
          enable-cache: true
          cache-python: true

      - name: Resolve release metadata
        id: release_meta
        run: |
          TAG_NAME="${RELEASE_TAG}"
          RELEASE_VERSION="${TAG_NAME#v}"

          if [[ -z "$TAG_NAME" || "$TAG_NAME" == "$RELEASE_VERSION" ]]; then
            echo "Expected a v-prefixed tag like v1.2.0, got '$TAG_NAME'." >&2
            exit 1
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$ ]]; then
            echo "Tag '$TAG_NAME' does not map to a valid semantic version." >&2
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag is reachable from main
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          git fetch --force origin main:refs/remotes/origin/main
          TAG_COMMIT="$(git rev-list -n 1 "$TAG_NAME")"

          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "Tag '$TAG_NAME' points to $TAG_COMMIT, which is not reachable from origin/main." >&2
            exit 1
          fi

      - name: Verify no conflict markers are present
        run: |
          if git grep -n -I -E '^(<<<<<<<|=======|>>>>>>>)' -- .; then
            echo "Conflict markers were found in the release source." >&2
            exit 1
          fi

      - name: Verify release metadata matches repository versions
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./extension/manifest.json').version")

          if [[ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "package.json version $PACKAGE_VERSION does not match release version $RELEASE_VERSION" >&2
            exit 1
          fi

          if [[ "$MANIFEST_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "extension/manifest.json version $MANIFEST_VERSION does not match release version $RELEASE_VERSION" >&2
            exit 1
          fi

          PYPROJECT_VERSION=$(python3 -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          if [[ "$PYPROJECT_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "pyproject.toml version $PYPROJECT_VERSION does not match release version $RELEASE_VERSION" >&2
            exit 1
          fi

      - name: Verify changelog section exists
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          awk -v version="$RELEASE_VERSION" '
            $0 ~ "^## \\[" version "\\]" {capture=1}
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" {exit}
            capture {print}
          ' CHANGELOG.md > changelog-section.md

          if [[ ! -s changelog-section.md ]]; then
            echo "CHANGELOG.md is missing a section for version $RELEASE_VERSION." >&2
            exit 1
          fi

      - name: Install test dependencies
        run: |
          npm ci
          uv sync --frozen --dev --no-install-project

      - name: Run JavaScript unit tests
        run: npm run test:unit

      - name: Run Python tests
        run: uv run --no-sync pytest tests/server/ -v

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: xvfb-run -a npm run test:e2e

      - name: Summarize release inputs
        run: |
          {
            echo "## Release"
            echo ""
            echo "- tag_name: \`${{ steps.release_meta.outputs.tag_name }}\`"
            echo "- release_version: \`${{ steps.release_meta.outputs.release_version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-windows-installer:
    name: Build Windows Setup
    runs-on: windows-latest
    needs: verify-release-version
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.verify-release-version.outputs.tag_name }}

      - uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.7'
          python-version: '3.11'
          enable-cache: true
          cache-python: true

      - name: Install build dependencies
        shell: pwsh
        run: uv sync --frozen --no-dev --no-install-project

      - name: Build Windows installer staging
        env:
          AI_SAFE_PLUGIN_RELEASE_TAG: ${{ needs.verify-release-version.outputs.tag_name }}
          AI_SAFE_PLUGIN_RELEASE_HTML_URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.verify-release-version.outputs.tag_name }}
        shell: pwsh
        run: |
          $env:AI_SAFE_PLUGIN_RELEASE_PUBLISHED_AT = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          uv run --no-sync python scripts/build_windows_installer.py

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile Windows installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "packaging\windows\AISafePluginSetup.iss"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-safe-plugin-windows-setup
          path: dist/AISafePluginSetup-${{ needs.verify-release-version.outputs.release_version }}.exe
          if-no-files-found: error

  publish-release-assets:
    name: Build And Upload Release Assets
    runs-on: ubuntu-latest
    needs:
      - verify-release-version
      - build-windows-installer
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.verify-release-version.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.7'
          python-version: '3.11'
          enable-cache: true
          cache-python: true

      - name: Install build dependencies
        run: |
          npm ci
          uv sync --frozen --no-dev --no-install-project

      - name: Build extension ZIP
        run: bash scripts/build_crx.sh dist/ai-safe-plugin-extension.zip

      - name: Build backend release bundle
        env:
          AI_SAFE_PLUGIN_RELEASE_TAG: ${{ needs.verify-release-version.outputs.tag_name }}
          AI_SAFE_PLUGIN_RELEASE_HTML_URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.verify-release-version.outputs.tag_name }}
        run: |
          export AI_SAFE_PLUGIN_RELEASE_PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          uv run --no-sync python scripts/build_backend_bundle.py

      - name: Build model bundle (fp16 ONNX from HuggingFace)
        run: uv run --no-sync python scripts/build_model_bundle.py

      - name: Rename extension ZIP with version
        run: mv dist/ai-safe-plugin-extension.zip "dist/ai-safe-plugin-extension-${{ needs.verify-release-version.outputs.release_version }}.zip"

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v8
        with:
          name: ai-safe-plugin-windows-setup
          path: dist

      - name: Create stable Windows installer alias
        run: cp "dist/AISafePluginSetup-${{ needs.verify-release-version.outputs.release_version }}.exe" dist/AISafePluginSetup.exe

      - name: Generate asset checksums
        working-directory: dist
        env:
          RELEASE_VERSION: ${{ needs.verify-release-version.outputs.release_version }}
        run: |
          sha256sum \
            "ai-safe-plugin-extension-${RELEASE_VERSION}.zip" \
            install.sh \
            install.ps1 \
            uninstall.sh \
            uninstall.ps1 \
            ai-safe-plugin-backend-unix.tar.gz \
            ai-safe-plugin-backend-windows.zip \
            ai-safe-plugin-model-fp16.tar.gz \
            "AISafePluginSetup-${RELEASE_VERSION}.exe" \
            AISafePluginSetup.exe \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Compose release notes
        env:
          RELEASE_VERSION: ${{ needs.verify-release-version.outputs.release_version }}
        run: |
          awk -v version="$RELEASE_VERSION" '
            $0 ~ "^## \\[" version "\\]" {capture=1}
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" {exit}
            capture {print}
          ' CHANGELOG.md > release-notes.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.verify-release-version.outputs.tag_name }}
          name: "AI-Safe Plugin ${{ needs.verify-release-version.outputs.tag_name }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(needs.verify-release-version.outputs.tag_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/ai-safe-plugin-extension-${{ needs.verify-release-version.outputs.release_version }}.zip
            dist/install.sh
            dist/install.ps1
            dist/uninstall.sh
            dist/uninstall.ps1
            dist/ai-safe-plugin-backend-unix.tar.gz
            dist/ai-safe-plugin-backend-windows.zip
            dist/ai-safe-plugin-model-fp16.tar.gz
            dist/AISafePluginSetup-${{ needs.verify-release-version.outputs.release_version }}.exe
            dist/AISafePluginSetup.exe
            dist/SHA256SUMS
